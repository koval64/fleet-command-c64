<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fleet Command C64</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bungee&family=Chakra+Petch:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=20260615" />
  </head>
  <body class="menu-open">
    <div class="bg-grid" aria-hidden="true"></div>
    <main class="app">
      <section class="hud" aria-live="polite">
        <div class="hud-strip">
          <span class="hud-status" id="status">Twoja tura. Wybierz cele.</span>
          <button id="new-game-btn" type="button">Menu</button>
        </div>
      </section>

      <section class="boards">
        <div class="end-panels" id="end-panels">
          <article class="board-wrap" id="player-wrap">
            <h3>Twoja flota</h3>
            <div class="board" id="player-board" aria-label="Plansza gracza"></div>
            <div class="board-info" aria-live="polite">
              <span class="board-info-title">Gracz</span>
              <span>Salwy <span id="player-salvos">20</span></span>
              <span>Trafienia <span id="player-hits">0</span></span>
              <span>Zatop. <span id="player-sunk">0</span>/5</span>
            </div>
          </article>

          <article class="board-wrap" id="enemy-wrap">
            <h3>Radar wroga</h3>
            <div class="board enemy" id="enemy-board" aria-label="Plansza wroga"></div>
            <div class="board-info" aria-live="polite">
                <span class="board-info-title">Wróg</span>
                <span>Salwy <span id="ai-salvos">20</span></span>
                <span>Trafienia <span id="ai-hits">0</span></span>
                <span>Zatop. <span id="ai-sunk">0</span>/5</span>
            </div>
          </article>
        </div>

        <div class="end-scroll-controls" id="end-scroll-controls" aria-hidden="true">
          <button class="end-scroll-btn" id="end-scroll-prev" type="button" aria-label="Pokaż poprzednią planszę">←</button>
          <button class="end-scroll-btn" id="end-scroll-next" type="button" aria-label="Pokaż następną planszę">→</button>
        </div>
      </section>

    </main>

    <div id="start-overlay" class="start-overlay" aria-live="polite" role="dialog" aria-modal="true">
      <div class="start-card">
        <div class="start-menu-grid">
          <div class="difficulty-line">
            <label class="start-label" for="start-difficulty-select">Poziom wroga:</label>
            <select id="start-difficulty-select" aria-label="Poziom wroga">
              <option value="easy">Łatwy</option>
              <option value="normal" selected>Normalny</option>
              <option value="hard">Trudny</option>
            </select>
          </div>
          <button id="start-game-btn" type="button">Nowa gra</button>
          <button id="back-to-game-btn" type="button">Wróć</button>
        </div>
      </div>
    </div>

    <div id="end-overlay" class="end-overlay hidden" aria-live="polite" role="dialog" aria-modal="true">
      <div class="end-card">
        <h2 id="end-title">Koniec bitwy</h2>
        <p id="end-message">Wygrana!</p>
        <p id="end-score">Trafienia gracza: 0 | Trafienia wroga: 0</p>
        <div class="end-actions">
          <button id="rematch-btn" type="button">Rewanż</button>
          <button id="close-overlay-btn" type="button">Zamknij</button>
        </div>
      </div>
    </div>

    <script src="config.js?v=20260615"></script>
    <script src="audio.js?v=20260615"></script>
    <script src="board.js?v=20260615"></script>
    <script src="ai.js?v=20260615"></script>
    <script src="ui.js?v=20260615"></script>
    <script src="game.js?v=20260615"></script>
  </body>
</html>
